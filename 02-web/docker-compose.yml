services:
  app:
    build: .
    image: skillshub:latest
    container_name: skillshub
    restart: always
    ports:
      - "127.0.0.1:3003:3003"
    env_file: .env
    environment:
      DATABASE_PATH: /data/skills.db
      PORT: "3003"
    volumes:
      - ./data:/data
      - ./backup:/backup
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3003/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
